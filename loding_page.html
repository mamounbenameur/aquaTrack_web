<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading | Ifest 2026</title>
    <style>
        :root {
            --water-color: #3498db;
            --water-deep: #2980b9;
            --water-light: #5dade2;
            --bg-dark: #0a192f;
            --text-white: #e6f1ff;
        }

        body.loading-page {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: radial-gradient(circle at center, #1a3a5f 0%, #0a192f 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        body.loading-page::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: url('https://www.transparenttextures.com/patterns/cubes.png');
            opacity: 0.05;
            pointer-events: none;
        }

        .loader-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 50px;
            z-index: 10;
        }

        .liquid-container {
            position: relative;
            width: 220px;
            height: 220px;
            background: rgba(255, 255, 255, 0.03);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            box-shadow: 
                0 0 30px rgba(52, 152, 219, 0.1),
                inset 0 0 20px rgba(255, 255, 255, 0.05);
            overflow: hidden;
            backdrop-filter: blur(8px);
            transition: transform 0.3s ease;
        }

        .liquid-container:hover {
            transform: scale(1.02);
        }

        .water {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 0%; 
            background: linear-gradient(180deg, var(--water-light), var(--water-deep));
            transition: height 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 -5px 15px rgba(52, 152, 219, 0.5);
        }

        .wave {
            position: absolute;
            bottom: 100%;
            left: -50%;
            width: 200%;
            height: 60px;
            background: var(--water-light);
            border-radius: 38% 42% 43% 37%;
            animation: wave-motion 4s infinite linear;
            opacity: 0.7;
            filter: blur(1px);
        }

        #wave2 {
            animation-duration: 7s;
            opacity: 0.4;
            border-radius: 42% 38% 37% 43%;
            background: var(--water-color);
        }

        #wave3 {
            animation-duration: 3.5s;
            opacity: 0.3;
            border-radius: 40% 40% 40% 40%;
            background: var(--water-deep);
        }

        @keyframes wave-motion {
            0% { transform: translateX(0) rotate(0deg); }
            100% { transform: translateX(25%) rotate(360deg); }
        }

        .spinner-ring {
            position: absolute;
            top: -10px;
            left: -10px;
            width: calc(100% + 20px);
            height: calc(100% + 20px);
            border: 3px solid transparent;
            border-top: 3px solid var(--water-light);
            border-left: 3px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            z-index: 20;
            animation: spin 2s linear infinite;
            pointer-events: none;
            filter: drop-shadow(0 0 5px var(--water-light));
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-status {
            text-align: center;
            color: var(--text-white);
            animation: fadeIn 1s ease-out;
            text-shadow: 0 0 10px rgba(0,0,0,0.5);
        }

        .loading-status h1 {
            font-size: 2.2rem;
            margin: 0 0 15px 0;
            font-weight: 300;
            letter-spacing: 4px;
            text-transform: uppercase;
            background: linear-gradient(90deg, #fff, #5dade2, #fff);
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 3s linear infinite;
        }

        @keyframes shine {
            to { background-position: 200% center; }
        }

        .loading-status p {
            font-size: 1.1rem;
            opacity: 0.6;
            margin: 0;
            font-weight: 300;
            letter-spacing: 1px;
        }

        .bubbles {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .bubble {
            position: absolute;
            bottom: -20px;
            background: rgba(255, 255, 255, 0.6);
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
            animation: bubble-up var(--duration) ease-in infinite;
        }

        @keyframes bubble-up {
            0% { transform: translateY(0) scale(0); opacity: 0; }
            20% { opacity: 0.8; }
            100% { transform: translateY(-250px) scale(1.2); opacity: 0; }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="loading-page">
    <div class="loader-wrapper">
        <div class="liquid-container">
            <div class="water">
                <div class="wave" id="wave1"></div>
                <div class="wave" id="wave2"></div>
                <div class="wave" id="wave3"></div>
            </div>
            <div class="bubbles" id="bubbles-container"></div>
            <div class="spinner-ring"></div>
        </div>
        <div class="loading-status">
            <h1 id="status-message">Collecting data</h1>
            <p>Gathering resources for a sustainable future.</p>
        </div>
    </div>
    <script >
        document.addEventListener('DOMContentLoaded', () => {
    const water = document.querySelector('.water');
    const statusMessage = document.getElementById('status-message');
    const bubblesContainer = document.getElementById('bubbles-container');

    let progress = 0;
    const duration = 5000; // 5 seconds loading
    const intervalTime = 50;
    const increment = (100 / (duration / intervalTime));

    const statusMessages = [
        "Collecting data",
        "Loading ...",
        "Almost there"
    ];

    // Create bubbles
    function createBubble() {
        const bubble = document.createElement('div');
        bubble.classList.add('bubble');
        
        const size = Math.random() * 10 + 5 + 'px';
        bubble.style.width = size;
        bubble.style.height = size;
        
        bubble.style.left = Math.random() * 100 + '%';
        bubble.style.setProperty('--duration', Math.random() * 2 + 1 + 's');
        
        bubblesContainer.appendChild(bubble);
        
        setTimeout(() => {
            bubble.remove();
        }, 3000);
    }

    const bubbleInterval = setInterval(createBubble, 300);

    const updateLoading = setInterval(() => {
        progress += increment;
        if (progress >= 100) {
            progress = 100;
            clearInterval(updateLoading);
            clearInterval(bubbleInterval);
            
            statusMessage.textContent = "Complete!";
            
            // Wait a bit then redirect
            setTimeout(() => {
                window.location.href = 'main_UI.html'; // Adjust target page as needed
            }, 1000);
        }

        const currentPercentage = Math.floor(progress);
        water.style.height = currentPercentage + '%';

        // Update status message based on progress
        const messageIndex = Math.floor((currentPercentage / 100) * (statusMessages.length - 1));
        statusMessage.textContent = statusMessages[messageIndex];

    }, intervalTime);
});

    </script>
</body>
</html>
